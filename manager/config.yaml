# Which MT5 credential profiles to run signal engines for.
# Each name must match a profile key in signal-engine/mt5-credentials.yaml.
sources:
  - fundednext
  - exness
  - fbs

# Path to the signal-engine root (parent of this manager/ directory).
# Relative paths are resolved from manager/config.yaml's location.
signal_engine:
  path: ..
  config: config.yaml

gateway_server:
  # Bind to 127.0.0.1 (localhost only) so only processes on this machine can
  # connect.  Change to 0.0.0.0 only if the execution engine runs on a
  # different host — and always set a strong secret in that case.
  host: 127.0.0.1
  port: 8765
  # Shared secret — must match signal_manager.token (or SIGNAL_MANAGER_TOKEN
  # env var) in every execution-engine-multi installation that connects here.
  # Leave blank only for fully isolated single-machine development setups.
  secret: ""

# Symbols pushed to each engine worker on startup (auto-subscribe).
symbols:
  - XAUUSD
  - US100
  - EURUSD
  - GBPUSD
  - USDJPY

consensus:
  window_ms: 60000   # wait up to 60s for a second broker to confirm

logging:
  level: INFO
