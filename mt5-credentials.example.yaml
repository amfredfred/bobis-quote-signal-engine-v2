# MT5 credential profiles — copy this to mt5-credentials.yaml and fill in your values.
# mt5-credentials.yaml is git-ignored. Never commit real credentials.
#
# In config.yaml, set:
#   mt5:
#     use: exness        <- picks the "exness" profile below
#
# Required fields per profile:
#   login                    -- MT5 account number (non-zero integer)
#   password                 -- MT5 account password
#   server                   -- broker server name (shown in MT5 login dialog)
#   terminal_path            -- full path to terminal64.exe for this broker
#   broker_time_offset_hours -- broker server time vs UTC (e.g. UTC+3 -> 3)
#
# Optional:
#   config -- path to a broker-specific strategy config file.
#             Deep-merged on top of config.yaml at startup.
#             Omit entirely if you do not need per-broker overrides.

exness:
  login: 0
  password: ""
  server: "Exness-MT5Real5"
  terminal_path: "C:\\Program Files\\MetaTrader 5 EXNESS\\terminal64.exe"
  broker_time_offset_hours: 3
  config: zconfig/exness.yaml

