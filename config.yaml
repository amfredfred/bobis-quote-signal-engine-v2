websocket:
  host: 0.0.0.0
  port: 8765
  max_clients: 10

mt5:
  terminal_path: "c:\\Program Files\\FBS MetaTrader 5\\terminal64.exe"
  timeout_ms: 60000
  portable: false
  # FBS-Demo server time is UTC+3.
  broker_time_offset_hours: 3

market:
  weekend_sleep:
    enabled: false
    close_weekday: saturday
    close_time: "00:00"
    reopen_weekday: monday
    reopen_time: "00:00"

timeframes:
  pairs:
    - htf: 5min
      ltf: 5min
      entry_model: crt
  htf_lookback: 240
  htf_outputsize: 1000

signal_quality:
  min_wick_ratio: 0.51
  stop_model: wick
  max_sl_zone_mult: 1.0
  # Reject when spread exceeds this fraction of SL distance. 0 = disabled.
  max_spread_to_sl_ratio: 0.35
  # Global fallbacks — overridden per symbol below.
  min_rr: 2.5
  max_rr: 0  # disabled globally; controlled per symbol via rrr
  # Per-symbol, per-TF RR. min_rr and max_rr resolve independently.
  # Priority: symbol+TF > symbol+* > *+TF > *+* > global.
  # COMMODITY class hardcodes max_rr: 8.0 in profiles.py before this runs.
  rrr:
    XAUUSD:
      "5/5":
        min_rr: 2.5
        max_rr: 2.5
    US100:
      "5/5":
        min_rr: 2.5
        max_rr: 3
    US500:
      "5/5":
        min_rr: 2.5
        max_rr: 3

signal_lifetime:
  expiry_hours: 120

signals:
  max_emit_lag_ms: 120000

zones:
  max_htf_zones_per_dir: 2
  max_signal_count: 3

features:
  use_trend_filter: true
  use_invalidation: false
  multi_tf_independent_positions: false
  entry_model: crt

crt:
  mode: previous_candle

trade_management:
  tp1_trigger_pct: 55
  tp1_close_pct: 0.0
  move_sl_to_be_on_tp1: true
  # 0 = entry BE; >= 1 = multiplier applied to spread.
  breakeven_spread_multiplier: 1.2
  breakeven_max_buffer_pct_of_risk: 10.0
  tf_overrides:
    XAUUSD:
      "5/5":
        tp1_trigger_pct: 45.0
    US100:
      "5/5":
        tp1_trigger_pct: 25.0
    US500:
      "5/5":
        tp1_trigger_pct: 30.0

displacement_filter:
  enabled: false
  atr_period: 10
  atr_mult: 1.0
  tf_mult:
    "5/5": 1.0

circuit_breaker:
  max_consecutive_losses: 10
  pause_after_streak_h: 12

session_filter:
  enabled: true
  # XAUUSD uses hardcoded COMMODITY sessions from profiles.py (Tokyo+London+NY).
  # This block is the fallback for any symbol not in ASSET_CLASS_MAP.
  sessions:
    tokyo:
      start: "00:00"
      end: "08:00"
      enabled: true
      blocked_hours: []
    london:
      start: "08:00"
      end: "16:00"
      enabled: true
      blocked_hours: []
    new_york:
      start: "16:00"
      end: "00:00"
      enabled: true
      blocked_hours: []

logging:
  level: INFO
  dir: logs
