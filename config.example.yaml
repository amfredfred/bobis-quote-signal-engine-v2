websocket:
  host: 0.0.0.0
  port: 8765
  max_clients: 10

mt5:
  use: exness       # matches a profile key in mt5-credentials.yaml
  timeout_ms: 60000
  portable: false

market:
  weekend_sleep:
    enabled: true
    close_weekday: saturday
    close_time: "00:00"
    reopen_weekday: monday
    # Sydney session opens Sunday 22:00 UTC = Monday 01:00 broker (UTC+3).
    # Waking at 00:00 is 1 hour before MT5 has live tick data.
    reopen_time: "01:00"

timeframes:
  pairs:
    - htf: 5min
      ltf: 5min
      entry_model: crt
  htf_lookback:
    "5/5": 60
  htf_outputsize: 1000

signal_quality:
  stop_model: wick
  max_sl_zone_mult: 1.0
  # Reject when spread exceeds this fraction of SL distance. 0 = disabled.
  max_spread_to_sl_ratio: 0.35
  # Global fallbacks -- overridden per symbol below.
  min_rr: 2.5
  max_rr: 0  # disabled globally; controlled per symbol via rrr
  # Per-symbol, per-TF RR. min_rr and max_rr resolve independently.
  # Priority: symbol+TF > symbol+* > *+TF > *+* > global.
  # COMMODITY class hardcodes max_rr: 8.0 in profiles.py before this runs.
  rrr:
    XAUUSD:
      "5/5":
        min_rr: 8
        max_rr: 3
    XAGUSD:
      "5/5":
        min_rr: 8
        max_rr: 3

signal_lifetime:
  expiry_hours: 120

signals:
  max_emit_lag_ms: 120000

zones:
  max_htf_zones_per_dir: 2
  max_signal_count: 3

features:
  use_trend_filter: true
  use_invalidation: false
  multi_tf_independent_positions: false
  entry_model: crt

crt:
  mode: previous_candle

trade_management:
  tp1_trigger_pct: 45
  tp1_close_pct: 0.0
  move_sl_to_be_on_tp1: true
  tf_overrides:
    XAUUSD:
      "5/5":
        tp1_trigger_pct: 45.0
    XAGUSD:
      "5/5":
        tp1_trigger_pct: 25.0

displacement_filter:
  enabled: false
  atr_period: 10
  atr_mult: 1.0
  tf_mult:
    "5/5": 1.0

circuit_breaker:
  max_consecutive_losses: 10
  pause_after_streak_h: 12

session_filter:
  enabled: true
  # XAUUSD uses hardcoded COMMODITY sessions from profiles.py (Tokyo+London+NY).
  # This block is the fallback for any symbol not in ASSET_CLASS_MAP.
  sessions:
    tokyo:
      start: "00:00"
      end: "08:00"
      enabled: true
      blocked_hours: []
    london:
      start: "08:00"
      end: "16:00"
      enabled: true
      blocked_hours: []
    new_york:
      start: "16:00"
      end: "00:00"
      enabled: true
      blocked_hours: []

logging:
  level: INFO
  dir: logs
